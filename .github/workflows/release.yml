name: Release

# Push a version tag (e.g. v0.1.0) to build installers for both platforms and
# publish them to a GitHub Release. Manual runs are allowed for testing.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed to create the Release and upload installers

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13 # pinned: electron-builder 25 dmg/codesign breaks on the macos-14/15 runners
            platform: mac
          - os: windows-latest # builds the .exe (NSIS) installer
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # electron-builder runs on Node here (not bun) — avoids the bun crash and
      # lets each OS build its own native installer (no cross-compile / Wine).
      - name: Install dependencies
        run: npm install

      # TypeScript is a devDependency, so tsc is present after npm install.
      # This is the only gate runnable without a logged-in claude CLI, and it
      # only fires at tag time, so it does not disturb day-to-day commits.
      - name: Typecheck
        run: npx --no-install tsc --noEmit

      # Release-invariant backstop. Runs only if scripts/preflight.mjs exists;
      # otherwise it is a no-op. If present and it fails, the build fails.
      - name: Preflight (release invariants)
        shell: bash
        run: |
          if [ -f scripts/preflight.mjs ]; then
            node scripts/preflight.mjs
          else
            echo "preflight not present yet — skipping"
          fi

      - name: Build renderer
        run: npm run build:renderer

      - name: Build & publish installer (${{ matrix.platform }})
        run: npx --no-install electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # v1 ships UNSIGNED. Without this, electron-builder attempts an ad-hoc
          # codesign on the macOS runner and crashes ("not a file"). Skip signing
          # discovery explicitly; an explicit CSC_LINK below still takes precedence
          # once real certs are added.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # Gated mac signing + notarization. When these secrets exist,
          # electron-builder signs and notarizes automatically; when they are
          # absent they resolve empty and electron-builder skips signing and
          # still produces an unsigned build.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
